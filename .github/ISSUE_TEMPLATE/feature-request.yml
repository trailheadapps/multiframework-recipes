name: Feature request
description: Suggest an idea for this project
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **NOTICE:** Please use this form only for requesting features for the React Recipes application itself.

        For general questions around Apex, Lightning Web Components, or React use the existing channels:

        - [Trailblazer Community](https://trailhead.salesforce.com/trailblazer-community/groups/0F93A000000DJbJSAW?tab=discussion)
        - [Salesforce Stack Exchange](https://salesforce.stackexchange.com/)
  - type: textarea
    attributes:
      label: Summary
      description: A concise description of what's missing from the application.
      placeholder: |
        Ex. I'd like to see an implementation of [...]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Suggested Solution
      description: A concise description of what you want to happen.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Alternative Solutions
      description: A concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
