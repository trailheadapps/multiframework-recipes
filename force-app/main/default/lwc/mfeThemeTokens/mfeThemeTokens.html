            <p class="slds-text-body_regular slds-m-bottom_medium">

                <code>viewSDK.getTheme()</code> and the broader environment
                via <code>chatSDK.getHostContext()</code>.

            <div class="shell-container" style="height: 400px">
                <lightning-embedding
                    sandbox="allow-forms allow-modals"
                    shell-title="MFE Theme Tokens"
                    debug={debug}
                    src={computedSrc}
                ></lightning-embedding>
            </div>
        </div>
    </lightning-card>
</template>
